name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run lint


  # ── Unit Tests ────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests with coverage
        run: npx jest --selectProjects unit --coverage --coverageReporters=text --coverageReporters=json-summary
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          HCM_WEBHOOK_SECRET: ci-webhook-secret-minimum-32-chars

      - name: Upload unit coverage report
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/
          retention-days: 14


  # ── Integration Tests ─────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      # ── Start Mock HCM Server ────────────────────────────────────────────────
      - name: Start Mock HCM Server
        run: |
          cd mock-hcm
          npm install

          echo "Starting Mock HCM Server..."

          nohup npx ts-node server.ts > hcm.log 2>&1 &
          echo $! > hcm.pid

          echo "Waiting for Mock HCM to be ready..."

          npx wait-on http://127.0.0.1:4000/hcm/health --timeout 60000

          curl --retry 10 --retry-delay 2 --retry-connrefused \
            http://127.0.0.1:4000/hcm/health \
            -H "X-API-Key: mock-hcm-api-key"

          echo "Mock HCM is ready"

        env:
          MOCK_HCM_PORT: 4000
          HCM_API_KEY: mock-hcm-api-key
          MOCK_HCM_FAIL_RATE: 0

      # ── Run Integration Tests ───────────────────────────────────────────────
      - name: Run integration tests
        run: npx jest --selectProjects integration --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          DB_PATH: ':memory:'
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          HCM_BASE_URL: http://127.0.0.1:4000
          HCM_API_KEY: mock-hcm-api-key
          HCM_WEBHOOK_SECRET: ci-webhook-secret-minimum-32-chars
          STALE_THRESHOLD_MS: 300000

      # ── Upload Coverage ──────────────────────────────────────────────────────
      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-coverage
          path: coverage/
          retention-days: 14


  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7